<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>영작노트 — 매일 쓰고 고치는 영어 공부</title>

<!-- PWA: 홈 화면에 추가했을 때 앱처럼 보이도록 하는 설정 -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2A2620">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="영작노트">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Pretendard-ish:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --paper: #FAF6EE;
    --paper-2: #F2ECDD;
    --card: #FFFFFF;
    --ink: #2A2620;
    --ink-soft: #6B6356;
    --ink-faint: #A39C8C;
    --rule: #E4DCC8;
    --rule-strong: #D2C7A8;
    --red: #C73E2E;
    --red-soft: #F4DCD6;
    --red-bg: #FBEEEA;
    --gold: #B8862E;
    --gold-bg: #F6EBD4;
    --green: #3F6B3A;
    --green-bg: #E7EFE2;
    --navy: #2B3A4A;
    --navy-bg: #E6EBEF;
    --shadow-pin: 0 1px 0 rgba(42,38,32,0.04), 0 8px 24px rgba(42,38,32,0.06);
    --font-serif: 'Source Serif 4', 'Noto Serif KR', serif;
    --font-kr: 'Noto Serif KR', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--paper);
    background-image:
      linear-gradient(var(--paper) 0%, var(--paper) 100%);
    color: var(--ink);
    font-family: var(--font-sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body::before{
    content:"";
    position: fixed; inset:0;
    background-image: repeating-linear-gradient(transparent, transparent 27px, var(--rule) 28px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  #app{ position: relative; z-index: 1; }

  /* ---------- layout shell ---------- */
  .shell{ max-width: 880px; margin: 0 auto; padding: 0 20px 80px; }
  header.top{
    padding: 28px 0 18px;
    display:flex; align-items:flex-end; justify-content:space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand .mark{
    width: 34px; height:34px; border-radius:8px;
    background: var(--ink); color: var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-serif); font-style: italic; font-weight:600; font-size:18px;
    transform: rotate(-4deg);
  }
  .brand h1{
    font-family: var(--font-kr); font-weight:700; font-size: 22px; margin:0; letter-spacing:-0.01em;
  }
  .brand .sub{ font-size:12.5px; color:var(--ink-soft); margin-top:2px; }
  .status-pill{
    font-size:12px; color:var(--ink-soft); display:flex; align-items:center; gap:6px;
    background: var(--card); border:1px solid var(--rule); padding:6px 12px; border-radius:99px;
  }
  .status-pill .dot{ width:7px;height:7px;border-radius:50%; background: var(--green); flex:none; }
  .status-pill.saving .dot{ background: var(--gold); animation: pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* ---------- tab nav ---------- */
  nav.tabs{
    display:flex; gap:4px; background: var(--paper-2);
    border:1px solid var(--rule); border-radius:14px; padding:4px;
    margin-bottom: 26px; overflow-x:auto;
  }
  nav.tabs button{
    flex:1; min-width: 130px; appearance:none; border:none; background:transparent;
    font-family: var(--font-sans); font-size: 13.5px; font-weight:600; color: var(--ink-soft);
    padding: 11px 10px; border-radius: 10px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  nav.tabs button i{ font-size:16px; }
  nav.tabs button.active{ background: var(--card); color: var(--ink); box-shadow: var(--shadow-pin); }
  nav.tabs button .count{
    font-size:10.5px; background: var(--red); color:#fff; border-radius:99px;
    padding: 1px 6px; font-weight:700; margin-left:2px;
  }
  nav.tabs button:not(.active):hover{ color: var(--ink); }

  .panel{ display:none; }
  .panel.active{ display:block; animation: fadeIn .25s ease; }
  @keyframes fadeIn{ from{opacity:0; transform: translateY(4px);} to{opacity:1; transform:none;} }

  /* ---------- 서재 미니 카드 (헤더 아래, 버튼형) ---------- */
  .library-mini{
    width:100%; appearance:none; border:1px solid var(--rule-strong); cursor:pointer; text-align:left;
    background: var(--card);
    border-radius: 14px; padding: 13px 16px; margin-bottom: 22px;
    display:flex; align-items:center; gap:10px;
    box-shadow: var(--shadow-pin); transition: transform .12s, opacity .15s;
  }
  .library-mini:hover{ opacity:0.92; }
  .library-mini:active{ transform: scale(0.99); }
  .library-mini-icon{
    width:30px; height:30px; border-radius:50%; flex:none;
    background: var(--gold-bg); color: var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:15px;
  }
  .library-mini-label{ flex:1; font-size:13px; font-weight:600; color: var(--ink); }
  .library-mini-sub{ font-size:11.5px; color: var(--ink-soft); margin-top:1px; }
  .library-mini-arrow{ color: var(--ink-faint); font-size:15px; flex:none; }

  /* ---------- 서재 풀 탭 ---------- */
  .library-full{ position: relative; }
  .library-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    margin-bottom: 18px; flex-wrap:wrap;
  }
  .library-head-title{ font-family: var(--font-kr); font-size:16px; font-weight:700; color: var(--ink); }
  .library-head-sub{ font-size:12.5px; color: var(--ink-soft); margin-top:2px; }
  .library-stats{ display:flex; gap:10px; flex-wrap:wrap; }
  .library-stat{
    background: var(--paper-2); border:1px solid var(--rule); border-radius:10px;
    padding:8px 16px; text-align:center; min-width:84px;
  }
  .library-stat .v{ font-size:18px; font-weight:700; color: var(--ink); font-family: var(--font-serif); }
  .library-stat .l{ font-size:10.5px; color: var(--ink-soft); margin-top:1px; }

  .shelf-progress{
    display:flex; align-items:center; gap:10px; margin-bottom: 20px;
    font-size:12.5px; color: var(--ink-soft); font-weight:600;
  }
  .shelf-progress .track{ flex:1; height:6px; background: var(--paper-2); border-radius:99px; overflow:hidden; border:1px solid var(--rule); }
  .shelf-progress .fill{ height:100%; background: var(--gold); border-radius:99px; transition: width .3s ease; }

  .bookshelf{
    background: var(--paper-2); border:1px solid var(--rule); border-radius:16px;
    padding: 18px; box-shadow: var(--shadow-pin); margin-bottom: 22px;
  }
  .bookshelf-grid{
    display:grid; grid-template-columns: repeat(10, 1fr); gap:6px;
  }
  .book-slot{
    aspect-ratio: 3 / 4; border-radius:5px; position:relative; cursor:default;
    display:flex; align-items:center; justify-content:center;
  }
  .book-slot.empty{
    border: 1.5px dashed var(--rule-strong); background: var(--paper);
  }
  .book-slot.filled{
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08), var(--shadow-pin);
    cursor: pointer; animation: bookPop .35s ease-out backwards;
  }
  .book-slot.filled:hover{ transform: translateY(-2px); }
  .book-slot.filled .spine-line{
    position:absolute; top:8%; bottom:8%; left:50%; width:1px; background: rgba(255,255,255,0.35);
  }
  @keyframes bookPop{
    0%{ transform: scale(0.4) translateY(6px); opacity:0; }
    100%{ transform: scale(1) translateY(0); opacity:1; }
  }

  .library-archive{ margin-top: 8px; }
  .library-archive-title{ font-size:12px; font-weight:700; color: var(--ink-soft); margin-bottom:10px; }
  .library-archive-grid{ display:flex; flex-wrap:wrap; gap:10px; }
  .archive-card{
    background: var(--card); border:1px solid var(--rule); border-radius:10px;
    padding:10px 14px; display:flex; align-items:center; gap:8px; min-width:120px;
  }
  .archive-card i{ color: var(--gold); font-size:16px; }
  .archive-card .n{ font-size:13px; font-weight:700; color: var(--ink); }
  .archive-card .l{ font-size:10.5px; color: var(--ink-soft); }

  .book-modal-backdrop{
    position: fixed; inset:0; background: rgba(42,38,32,0.45);
    display:flex; align-items:center; justify-content:center; z-index: 1000; padding:24px;
  }
  .book-modal{
    background: var(--card); border-radius:16px; padding:24px; max-width:360px; width:100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }
  .book-modal-cover{
    width:64px; height:84px; border-radius:6px; margin-bottom:14px;
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:22px;
  }
  .book-modal h3{ font-family: var(--font-kr); font-size:16px; margin:0 0 6px; }
  .book-modal .meta{ font-size:12px; color: var(--ink-soft); margin-bottom:14px; }
  .book-modal .preview{
    font-family: var(--font-serif); font-size:13.5px; color: var(--ink-soft);
    line-height:1.6; border-top:1px dashed var(--rule-strong); padding-top:12px; font-style:italic;
  }

  /* ---------- generic card ---------- */
  .card{
    background: var(--card); border:1px solid var(--rule); border-radius:16px;
    padding: 22px; box-shadow: var(--shadow-pin);
  }
  .card + .card{ margin-top:18px; }
  .card h2{ font-family: var(--font-kr); font-size:16px; font-weight:700; margin:0 0 4px; }
  .card .desc{ font-size:13px; color:var(--ink-soft); margin:0 0 16px; line-height:1.55; }

  textarea.paste-area{
    width:100%; min-height: 170px; resize: vertical;
    border:1px solid var(--rule-strong); border-radius:10px; background: var(--paper);
    padding:14px 16px; font-size:14.5px; line-height:1.65; color: var(--ink);
    font-family: var(--font-sans);
  }
  textarea.paste-area:focus{ outline:2px solid var(--navy); outline-offset:1px; }
  .char-row{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size:12px; color: var(--ink-faint); }
  .char-row .over{ color: var(--red); font-weight:600; }

  .btn{
    appearance:none; border:1px solid var(--ink); background: var(--ink); color: var(--paper);
    font-family: var(--font-sans); font-weight:600; font-size:13.5px;
    padding:10px 18px; border-radius:10px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    transition: transform .1s, opacity .15s;
  }
  .btn:hover{ opacity:0.88; }
  .btn:active{ transform: scale(0.98); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn.ghost{ background: transparent; color: var(--ink); border:1px solid var(--rule-strong); }
  .btn.ghost:hover{ background: var(--paper-2); opacity:1; }
  .btn.danger{ background: var(--red); border-color: var(--red); }
  .btn.gold{ background: var(--gold); border-color: var(--gold); }
  .btn.sm{ padding:7px 12px; font-size:12.5px; border-radius:8px; }

  /* ---------- progress strip ---------- */
  .progress-strip{
    display:flex; align-items:center; gap:14px; margin: 18px 0 22px;
  }
  .progress-strip .track{ flex:1; height:6px; background: var(--paper-2); border-radius:99px; overflow:hidden; border:1px solid var(--rule); }
  .progress-strip .fill{ height:100%; background: var(--navy); border-radius:99px; transition: width .3s ease; }
  .progress-strip .label{ font-size:12.5px; color: var(--ink-soft); white-space:nowrap; font-weight:600; }

  /* ---------- sentence study card ---------- */
  .study-card{
    background: var(--card); border:1px solid var(--rule); border-radius: 18px;
    padding: 28px 28px 24px; box-shadow: var(--shadow-pin); position:relative; overflow:hidden;
  }
  .study-card .src-label{
    font-size:11.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
    color: var(--ink-faint); margin-bottom:10px; display:flex; align-items:center; gap:6px;
  }
  .study-card .src-text{
    font-family: var(--font-serif); font-size: 21px; line-height:1.55; color: var(--ink);
    margin: 0 0 14px;
  }
  .panel#tab-interpret .study-card .src-text{ font-style: italic; }

  .reveal-toggle{
    appearance:none; border:1px solid var(--rule-strong); background: var(--paper-2);
    color: var(--ink-soft); cursor:pointer; border-radius:8px;
    font-family: var(--font-sans); font-size:12px; font-weight:600;
    padding:7px 12px; display:inline-flex; align-items:center; gap:6px;
    margin-bottom: 14px; transition: all .15s;
  }
  .reveal-toggle i{ font-size:14px; }
  .reveal-toggle:hover{ background: var(--rule); color: var(--ink); }
  .reveal-toggle.active{ background: var(--gold-bg); border-color: var(--gold); color: var(--gold); }
  .reveal-box{
    background: var(--gold-bg); border:1px solid var(--rule-strong); border-radius:10px;
    padding: 13px 15px; margin-bottom: 18px;
  }
  .reveal-label{
    font-size:10.5px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
    color: var(--gold); display:block; margin-bottom:6px;
  }
  .reveal-text{
    font-family: var(--font-serif); font-size:16px; line-height:1.55; color: var(--ink); margin:0;
  }

  .answer-row{ display:flex; gap:10px; align-items:stretch; }
  .answer-row textarea{
    flex:1; min-height:64px; resize:vertical;
    border:1.5px solid var(--rule-strong); border-radius:10px; background: var(--paper);
    padding:13px 14px; font-size:15px; line-height:1.6; color:var(--ink);
    font-family: var(--font-kr);
  }
  .panel#tab-write .answer-row textarea{ font-family: var(--font-sans); }
  .answer-row textarea:focus{ outline:2px solid var(--navy); outline-offset:1px; }
  .answer-row .send-btn{
    flex:none; width:auto; min-width:68px; min-height:46px; align-self:flex-start;
    padding:8px 16px; border-radius:10px;
    border:1.5px solid var(--rule-strong); background: var(--card); color: var(--ink-faint);
    cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    font-family: var(--font-sans); font-size:12.5px; font-weight:700;
    transition: all .2s ease; white-space:nowrap;
  }
  .answer-row .send-btn i{ font-size:16px; }
  .answer-row .send-btn:not(:disabled){
    border-color: var(--rule-strong); background: var(--paper-2); color: var(--ink-soft);
  }
  .answer-row .send-btn:not(:disabled):hover{
    border-color: var(--ink-soft); background: var(--rule); color: var(--ink);
  }
  .answer-row .send-btn:disabled{ cursor:not-allowed; }
  .hint-row{ font-size:11.5px; color: var(--ink-faint); margin-top:8px; }
  .hint-row kbd{ background: var(--paper-2); border:1px solid var(--rule); border-radius:4px; padding:1px 6px; font-family:var(--font-sans); }
  .hint-row-flex{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-top:8px; flex-wrap:wrap;
  }
  .hint-row-flex .hint-row{ margin-top:0; }
  .skip-btn{
    appearance:none; border:none; background:transparent; cursor:pointer;
    font-family: var(--font-sans); font-size:11.5px; font-weight:600; color: var(--ink-soft);
    display:inline-flex; align-items:center; gap:5px; padding:4px 2px;
    border-bottom: 1px dashed var(--rule-strong); flex:none;
    transition: color .15s;
  }
  .skip-btn:hover{ color: var(--ink); border-bottom-color: var(--ink-soft); }
  .skip-btn i{ font-size:13px; }

  /* ---------- grading result ---------- */
  .grade-wrap{ margin-top: 22px; border-top: 1px dashed var(--rule-strong); padding-top: 20px; }
  .grade-head{ display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .score-stamp{
    width:64px; height:64px; border-radius:50%; flex:none;
    border:3px solid var(--green); color: var(--green);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family: var(--font-serif); transform: rotate(-6deg);
  }
  .score-stamp.mid{ border-color: var(--gold); color: var(--gold); }
  .score-stamp.low{ border-color: var(--red); color: var(--red); }
  .score-stamp .num{ font-size:21px; font-weight:700; line-height:1; }
  .score-stamp .den{ font-size:9px; opacity:0.75; }
  .grade-headline{ flex:1; }
  .grade-headline .verdict{ font-weight:700; font-size:14.5px; margin-bottom:3px; }
  .grade-headline .verdict.good{ color: var(--green); }
  .grade-headline .verdict.mid{ color: var(--gold); }
  .grade-headline .verdict.low{ color: var(--red); }
  .grade-headline .one-line{ font-size:13px; color: var(--ink-soft); line-height:1.5; }

  .your-sentence{
    background: var(--red-bg); border:1px solid var(--red-soft); border-radius:10px;
    padding: 13px 15px; font-size:14.5px; line-height:1.7; margin-bottom:14px;
    font-family: var(--font-kr);
  }
  .panel#tab-write .your-sentence{ font-family: var(--font-sans); }
  .your-sentence .tag{ font-size:10.5px; font-weight:700; color: var(--red); text-transform:uppercase; letter-spacing:0.06em; display:block; margin-bottom:5px;}
  .your-sentence .err-word{ color: var(--red); text-decoration: underline wavy var(--red); text-underline-offset:3px; font-weight:600; }

  .corrected-sentence{
    background: var(--green-bg); border:1px solid #CFE0C8; border-radius:10px;
    padding: 13px 15px; font-size:14.5px; line-height:1.7; margin-bottom:18px;
    font-family: var(--font-kr);
  }
  .panel#tab-write .corrected-sentence{ font-family: var(--font-sans); }
  .corrected-sentence .tag{ font-size:10.5px; font-weight:700; color: var(--green); text-transform:uppercase; letter-spacing:0.06em; display:block; margin-bottom:5px;}

  .issue-list{ display:flex; flex-direction:column; gap:10px; margin-bottom: 20px; }
  .issue-item{
    border:1px solid var(--rule); border-radius:10px; padding:12px 14px; background: var(--paper);
  }
  .issue-item .issue-head{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .issue-item .badge{
    font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:99px; text-transform:uppercase; letter-spacing:0.04em;
  }
  .badge.grammar{ background: var(--navy-bg); color: var(--navy); }
  .badge.word{ background: var(--red-bg); color: var(--red); }
  .badge.style{ background: var(--gold-bg); color: var(--gold); }
  .issue-item .wrong-right{ font-size:14px; font-family: var(--font-sans); margin-bottom:5px; }
  .issue-item .wrong-right .w{ color: var(--red); text-decoration:line-through; text-decoration-color: var(--red); }
  .issue-item .wrong-right .arrow{ color: var(--ink-faint); margin:0 6px; }
  .issue-item .wrong-right .r{ color: var(--green); font-weight:600; }
  .issue-item .explain{ font-size:13px; color: var(--ink-soft); line-height:1.55; }

  .grade-actions{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .saved-badge{
    font-size:12.5px; color: var(--gold); font-weight:600; display:flex; align-items:center; gap:5px;
  }

  .loading-row{ display:flex; align-items:center; gap:10px; font-size:13.5px; color: var(--ink-soft); padding: 14px 0; }
  .spinner{
    width:16px; height:16px; border-radius:50%; border:2px solid var(--rule-strong); border-top-color: var(--ink);
    animation: spin .7s linear infinite; flex:none;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .empty-state{
    text-align:center; padding: 60px 20px; color: var(--ink-soft);
  }
  .empty-state i{ font-size:34px; color: var(--ink-faint); margin-bottom:14px; display:block; }
  .empty-state .t1{ font-weight:700; font-size:15px; color: var(--ink); margin-bottom:6px; }
  .empty-state .t2{ font-size:13px; line-height:1.6; max-width: 380px; margin: 0 auto; }

  .session-done{
    text-align:center; padding: 50px 20px;
  }
  .session-done i{ font-size:40px; color: var(--green); margin-bottom:14px; display:block; }
  .session-done h3{ font-family: var(--font-kr); font-size:18px; margin:0 0 8px; }
  .session-done p{ font-size:13.5px; color: var(--ink-soft); margin:0 0 22px; }
  .session-stats{ display:flex; gap:12px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
  .session-stats .stat{ background: var(--paper-2); border-radius:10px; padding:12px 18px; min-width:90px; }
  .session-stats .stat .v{ font-size:20px; font-weight:700; }

<script>
/* =========================================================
   영작노트 — app.js
   ========================================================= */

/* ---------- 전역 상태 ---------- */
const STORAGE_KEYS = {
  WRITE_SESSION: 'session:write',
  INTERPRET_SESSION: 'session:interpret',
  WORDS: 'words:all',
  SENTENCES: 'sentences:all',
  LAST_TAB: 'meta:lastTab',
  GALAXY: 'galaxy:progress',
};

let state = {
  lastTab: 'tab-library',
  write: null,      // { sourceText, sentences:[], idx, results:{idx:{...}}, finished:bool }
  interpret: null,
  words: [],         // [{id, word, meaning, example, wrongForm, source, createdAt}]
  sentences: [],     // [{id, mode, source, mine, corrected, score, issues, createdAt}]
  galaxy: {},        // { "2026-06-21": 5, "2026-06-20": 7, ... } 날짜별 완료 문장 수
  loadedOnce: false,
};

/* ---------- storage 헬퍼 (영구 저장, /api/storage → Supabase) ---------- */
async function storageGet(key, fallback) {
  try {
    const res = await fetch(`/api/storage?key=${encodeURIComponent(key)}`);
    if (!res.ok) return fallback;
    const data = await res.json();
    if (!data || data.value === null || data.value === undefined) return fallback;
    return typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
  } catch (e) {
    return fallback;
  }
}
async function storageSet(key, value) {
  setSaving(true);
  const MAX_RETRIES = 3;
  let lastError = null;
  for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
    try {
      const res = await fetch('/api/storage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, value: JSON.stringify(value) }),
      });
      if (res.ok) {
        setSaving(false);
        return true;
      }
      lastError = new Error('Storage set failed: ' + res.status);
    } catch (e) {
      lastError = e;
    }
    if (attempt < MAX_RETRIES - 1) {
      await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
    }
  }
  console.error('storage set failed after retries', key, lastError);
  showToast('저장에 실패했어요. 잠시 후 다시 시도해주세요.', true);
  setSaving(false);
  return false;
}
async function storageDelete(key) {
  try {
    await fetch(`/api/storage?key=${encodeURIComponent(key)}`, { method: 'DELETE' });
  } catch (e) { /* noop */ }
}

function setSaving(isSaving) {
  const pill = document.getElementById('statusPill');
  const text = document.getElementById('statusText');
  if (!pill || !text) return;
  if (isSaving) {
    pill.classList.add('saving');
    text.textContent = '저장 중…';
  } else {
    pill.classList.remove('saving');
    text.textContent = '자동 저장됨';
  }
}

/* ---------- 문장 분리 ----------
   마침표(.) 물음표(?) 느낌표(!) 기준으로 분리.
   단, 일반적인 약어(Mr. Mrs. Dr. St. e.g. i.e. etc. vs. U.S. a.m. p.m. 등)와
   소수점(3.14), 이니셜(J.K. Rowling) 뒤에서는 분리하지 않도록 보정한다.
------------------------------------------------- */
function splitIntoSentences(rawText) {
  const text = rawText.replace(/\r\n/g, '\n').trim();
  if (!text) return [];

  const ABBREV = new Set([
    'mr','mrs','ms','dr','prof','st','sr','jr','vs','etc','e.g','i.e',
    'u.s','u.k','a.m','p.m','no','inc','ltd','co','corp','approx','fig','vol','pp'
  ]);

  // 줄바꿈은 일단 공백으로 합치되, 빈 줄(문단 구분)은 별도 마커로 보존
  const paragraphs = text.split(/\n\s*\n/).map(p => p.replace(/\n/g, ' ').trim()).filter(Boolean);

  const sentences = [];
  for (const para of paragraphs) {
    let buf = '';
    for (let i = 0; i < para.length; i++) {
      const ch = para[i];
      buf += ch;
      if (ch === '.' || ch === '?' || ch === '!') {
        // 다음 글자들 살펴보기
        const rest = para.slice(i + 1);
        const nextNonSpaceMatch = rest.match(/^(\s*)(\S)?/);
        const spacesAfter = nextNonSpaceMatch ? nextNonSpaceMatch[1] : '';
        const nextChar = nextNonSpaceMatch ? nextNonSpaceMatch[2] : undefined;

        // 소수점: 3.14 같은 경우 (앞뒤가 숫자)
        const prevChar = para[i - 1];
        if (ch === '.' && /[0-9]/.test(prevChar || '') && /[0-9]/.test(nextChar || '')) {
          continue; // 분리하지 않음
        }

        // 약어 뒤 마침표 (Mr. Dr. etc.)
        if (ch === '.') {
          const wordMatch = buf.match(/([A-Za-z]+(?:\.[A-Za-z]+)*)\.$/);
          if (wordMatch) {
            const tok = wordMatch[1].toLowerCase();
            if (ABBREV.has(tok)) continue;
          }
          // 단일 대문자 이니셜 (J. K. Rowling)
          const initialMatch = buf.match(/\b([A-Z])\.$/);
          if (initialMatch && nextChar && /[A-Z]/.test(nextChar) && spacesAfter.length <= 1) {
            continue;
          }
        }

        // 다음 글자가 없거나(문장 끝), 공백 후 대문자/인용부호/숫자로 시작하면 문장 종료로 판단
        if (!nextChar) {
          sentences.push(buf.trim());
          buf = '';
          continue;
        }
        if (spacesAfter.length >= 1) {
          // 정상적인 문장 구분 (공백 뒤 다음 문장 시작)
          sentences.push(buf.trim());
          buf = '';
          continue;
        }
        // 공백 없이 바로 다음 글자가 이어지면(예: "...end."notes) 분리하지 않음
      }
    }
    if (buf.trim()) sentences.push(buf.trim());
  }

  // 너무 짧은 조각(빈 문장, 기호만 있는 것) 제거
  return sentences
    .map(s => s.trim())
    .filter(s => s.length > 0 && /[A-Za-z]/.test(s));
}

/* ---------- 유틸 ---------- */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
function escapeHtml(str) {
  return (str || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function showToast(msg, isErr) {
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  const icon = toast.querySelector('i');
  toastMsg.textContent = msg;
  toast.classList.toggle('err', !!isErr);
  icon.className = isErr ? 'ti ti-alert-circle' : 'ti ti-circle-check';
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2600);
}
function scoreClass(score) {
  if (score >= 8) return 'good';
  if (score >= 5) return 'mid';
  return 'low';
}
function scoreVerdict(score) {
  if (score >= 9) return '훌륭해요!';
  if (score >= 7) return '잘했어요';
  if (score >= 5) return '조금 더 다듬어볼까요';
  return '다시 살펴봐요';
}

/* =========================================================
   서버 API 호출 — 채점 / 첨삭 / 번역
   (API 키는 서버(/api/grade, /api/translate)에만 있고 브라우저에는 없다)
   ========================================================= */

/**
 * write 모드: 사용자가 한국어 해석을 보고 영어로 작문
 * interpret 모드: 사용자가 영어 문장을 보고 한국어로 해석
 */
async function gradeAnswerWrite(koreanPrompt, modelEnglish, userAnswer) {
  return callGradeAPI({ mode: 'write', koreanPrompt, modelEnglish, userAnswer });
}

async function gradeAnswerInterpret(englishSource, userAnswer) {
  return callGradeAPI({ mode: 'interpret', englishSource, userAnswer });
}

async function callGradeAPI(payload) {
  const response = await fetch('/api/grade', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  if (!response.ok) {
    let detail = '';
    try { detail = (await response.json()).error || ''; } catch (e) { /* noop */ }
    throw new Error('채점 API 오류: ' + response.status + (detail ? ' - ' + detail : ''));
  }
  const parsed = await response.json();

  parsed.score = Math.max(0, Math.min(10, Math.round(Number(parsed.score) || 0)));
  parsed.verdict_kr = parsed.verdict_kr || '';
  parsed.corrected_sentence = parsed.corrected_sentence || payload.userAnswer;
  parsed.issues = Array.isArray(parsed.issues) ? parsed.issues : [];
  parsed.wrong_words = Array.isArray(parsed.wrong_words) ? parsed.wrong_words : [];
  return parsed;
}

/**
 * 영작 탭에서 영어 문장들을 한국어로 미리 번역해서 "제시문"으로 보여주기 위한 호출.
 * 여러 문장을 배치로 묶어 서버(/api/translate)에 보낸다.
 */
async function translateBatchToKorean(sentences) {
  if (sentences.length === 0) return [];

  const fetchPromise = fetch('/api/translate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sentences }),
  });

  const timeoutPromise = new Promise((_, reject) => {
    setTimeout(() => reject(new Error('번역 요청이 시간 초과되었습니다.')), 45000);
  });

  const response = await Promise.race([fetchPromise, timeoutPromise]);
  if (!response.ok) throw new Error('번역 API 오류: ' + response.status);
  const data = await response.json();
  if (!Array.isArray(data.translations)) throw new Error('번역 응답 형식이 올바르지 않습니다.');
  return data.translations;
}

/**
 * 문장 배열을 청크 단위로 나눠 배치 번역하고, 실패한 청크는 재시도한다.
 * onProgress(doneCount, total) 콜백으로 진행 상황을 알려준다.
 */
async function translateAllToKorean(sentences, onProgress) {
  const CHUNK_SIZE = 12; // 한 번의 API 호출에 묶을 문장 수 (서버 쪽 제한은 20)
  const chunks = [];
  for (let i = 0; i < sentences.length; i += CHUNK_SIZE) {
    chunks.push(sentences.slice(i, i + CHUNK_SIZE));
  }

  const results = new Array(sentences.length).fill(null);
  let done = 0;

  // 청크들을 동시에(병렬) 요청 — 너무 많으면 한 번에 4개씩 묶어서 처리
  const PARALLEL = 4;
  for (let i = 0; i < chunks.length; i += PARALLEL) {
    const group = chunks.slice(i, i + PARALLEL);
    const groupResults = await Promise.allSettled(group.map(c => translateBatchToKorean(c)));

    groupResults.forEach((res, gi) => {
      const chunkIndex = i + gi;
      const startIdx = chunkIndex * CHUNK_SIZE;
      const chunk = chunks[chunkIndex];
      if (res.status === 'fulfilled') {
        res.value.forEach((kr, j) => {
          results[startIdx + j] = kr || null;
        });
      }
      done += chunk.length;
    });
    if (onProgress) onProgress(Math.min(done, sentences.length), sentences.length);
  }

  // 실패해서 비어있는 항목들 재시도 (한 번 더, 개별로)
  const missingIdx = results.map((v, i) => (v ? -1 : i)).filter(i => i !== -1);
  if (missingIdx.length > 0) {
    const missingSentences = missingIdx.map(i => sentences[i]);
    try {
      const retryChunks = [];
      for (let i = 0; i < missingSentences.length; i += CHUNK_SIZE) {
        retryChunks.push({
          idxSlice: missingIdx.slice(i, i + CHUNK_SIZE),
          sentSlice: missingSentences.slice(i, i + CHUNK_SIZE),
        });
      }
      for (const rc of retryChunks) {
        const retried = await translateBatchToKorean(rc.sentSlice);
        retried.forEach((kr, j) => {
          if (kr) results[rc.idxSlice[j]] = kr;
        });
      }
    } catch (e) {
      console.error('재시도 번역 실패', e);
    }
  }

  // 그래도 못 채운 곳은 빈 문자열 대신 원문이라도 보여주기 (학습 진행이 끊기지 않도록)
  for (let i = 0; i < results.length; i++) {
    if (!results[i]) results[i] = '(번역 실패 — 영어 원문을 참고해 작문해보세요) ' + sentences[i];
  }

  return results;
}

/* =========================================================
   탭 네비게이션

   ========================================================= */
function initTabs() {
  const buttons = document.querySelectorAll('nav.tabs button');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab, true));
  });
}

async function switchTab(tabId, persist) {
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === tabId);
  });
  state.lastTab = tabId;
  if (persist) await storageSet(STORAGE_KEYS.LAST_TAB, tabId);

  if (tabId === 'tab-words') renderWordsTab();
  if (tabId === 'tab-sentences') renderSentencesTab();
  if (tabId === 'tab-library') renderLibraryFullTab();
}

/* =========================================================
   초기 로드
   ========================================================= */
async function loadAll() {
  const [lastTab, writeSession, interpretSession, words, sentences, galaxy] = await Promise.all([
    storageGet(STORAGE_KEYS.LAST_TAB, 'tab-library'),
    storageGet(STORAGE_KEYS.WRITE_SESSION, null),
    storageGet(STORAGE_KEYS.INTERPRET_SESSION, null),
    storageGet(STORAGE_KEYS.WORDS, []),
    storageGet(STORAGE_KEYS.SENTENCES, []),
    storageGet(STORAGE_KEYS.GALAXY, {}),
  ]);
  state.lastTab = lastTab || 'tab-library';
  state.write = writeSession;
  state.interpret = interpretSession;
  state.words = words || [];
  state.sentences = sentences || [];
  state.galaxy = galaxy || {};
  state.loadedOnce = true;

  updateBadgeCounts();
  renderLibraryCard();
  renderWriteTab();
  renderInterpretTab();
  await switchTab(state.lastTab, false);
  setSaving(false);
}

function updateBadgeCounts() {
  const wc = document.getElementById('wordCount');
  const sc = document.getElementById('sentCount');
  if (state.words.length > 0) {
    wc.style.display = 'inline-block';
    wc.textContent = state.words.length;
  } else {
    wc.style.display = 'none';
  }
  if (state.sentences.length > 0) {
    sc.style.display = 'inline-block';
    sc.textContent = state.sentences.length;
  } else {
    sc.style.display = 'none';
  }
}

/* =========================================================
   내 서재 — 채점 완료 문장 10개마다 책 1권이 책장에 꽂힌다.
   책장 1개 = 100권 (1,000문장), 서재(도서관) 1개 = 책장 1개.
   서재는 최대 10개까지 (총 10,000문장).
   ========================================================= */
const SENTENCES_PER_BOOK = 10;
const BOOKS_PER_LIBRARY = 100;
const MAX_LIBRARIES = 10;

// 책 표지 색상 팔레트 (사이트 톤 안에서 순환)
const BOOK_COLORS = [
  { bg: '#C73E2E', label: '#FBEEEA' }, // red
  { bg: '#2B3A4A', label: '#E6EBEF' }, // navy
  { bg: '#B8862E', label: '#F6EBD4' }, // gold
  { bg: '#3F6B3A', label: '#E7EFE2' }, // green
  { bg: '#6B5B95', label: '#EDEAF5' }, // violet
  { bg: '#A35D34', label: '#F3E6DA' }, // terracotta
];

function totalSentenceCount() {
  return Object.values(state.galaxy || {}).reduce((sum, n) => sum + n, 0);
}

// 누적치를 보고 "현재 몇 번째 서재, 그 안에서 몇 권째 책장이 찼는지, 지금 만들고 있는 책 안에서 몇 문장째인지"를 계산
function getLibraryProgress() {
  const total = totalSentenceCount();
  const totalBooks = Math.floor(total / SENTENCES_PER_BOOK);
  const currentBookFilled = total % SENTENCES_PER_BOOK; // 지금 만들고 있는 책에 채워진 문장 수 (0~9)

  const libraryIndex = Math.min(Math.floor(totalBooks / BOOKS_PER_LIBRARY), MAX_LIBRARIES - 1);
  const booksInCurrentLibrary = totalBooks - libraryIndex * BOOKS_PER_LIBRARY;
  const archivedLibraries = Math.min(Math.floor(totalBooks / BOOKS_PER_LIBRARY), MAX_LIBRARIES);

  return {
    total,
    totalBooks,
    currentBookFilled,
    libraryIndex,                 // 지금 채우고 있는 책장의 인덱스 (0-based)
    booksInCurrentLibrary,        // 그 책장에 꽂힌 책 수 (0~100)
    archivedLibraries,            // 완전히 채워서 보관된 서재 수
    allLibrariesFull: totalBooks >= MAX_LIBRARIES * BOOKS_PER_LIBRARY,
  };
}

function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// 채점이 완료된 문장 1개를 누적에 더한다. 건너뛴 문장은 호출하지 않는다.
async function addLibraryProgress() {
  const key = todayKey();
  const beforeTotal = totalSentenceCount();
  state.galaxy[key] = (state.galaxy[key] || 0) + 1;
  await storageSet(STORAGE_KEYS.GALAXY, state.galaxy);

  const afterTotal = beforeTotal + 1;
  const justFinishedBook = Math.floor(afterTotal / SENTENCES_PER_BOOK) > Math.floor(beforeTotal / SENTENCES_PER_BOOK);

  renderLibraryCard();
  if (document.getElementById('tab-library')?.classList.contains('active')) renderLibraryFullTab();

  if (justFinishedBook) {
    showToast('새 책이 한 권 완성되어 책장에 꽂혔어요', false);
  }
}

/* ---------- 미니 카드 (헤더 아래, 오늘 진행 요약) ---------- */
function renderLibraryCard() {
  const container = document.getElementById('libraryCard');
  if (!container) return;

  const progress = getLibraryProgress();
  const todayCount = state.galaxy[todayKey()] || 0;

  const label = progress.allLibrariesFull
    ? `모든 서재를 채웠어요 (총 ${progress.total}문장)`
    : `${progress.currentBookFilled}/${SENTENCES_PER_BOOK}문장 — 책 한 권 완성까지`;
  const sub = `누적 ${progress.totalBooks}권 · 오늘 ${todayCount}문장 학습`;

  container.innerHTML = `
    <button class="library-mini" id="libraryMiniBtn" type="button">
      <span class="library-mini-icon"><i class="ti ti-book-2"></i></span>
      <span style="flex:1;">
        <span class="library-mini-label">${label}</span>
        <div class="library-mini-sub">${sub}</div>
      </span>
      <span class="library-mini-arrow"><i class="ti ti-chevron-right"></i></span>
    </button>
  `;
  const btn = document.getElementById('libraryMiniBtn');
  if (btn) btn.addEventListener('click', () => switchTab('tab-library', true));
}

/* ---------- 풀 화면 (내 서재 탭) ---------- */
function renderLibraryFullTab() {
  const container = document.getElementById('libraryFullContent');
  if (!container) return;

  const progress = getLibraryProgress();

  const slotsHtml = [];
  for (let i = 0; i < BOOKS_PER_LIBRARY; i++) {
    if (i < progress.booksInCurrentLibrary) {
      const globalBookIndex = progress.libraryIndex * BOOKS_PER_LIBRARY + i;
      const color = BOOK_COLORS[globalBookIndex % BOOK_COLORS.length];
      slotsHtml.push(`
        <div class="book-slot filled" style="background:${color.bg}; animation-delay:${Math.min(i, 20) * 25}ms;" data-book-index="${globalBookIndex}">
          <div class="spine-line"></div>
        </div>
      `);
    } else {
      slotsHtml.push(`<div class="book-slot empty"></div>`);
    }
  }

  const archiveHtml = [];
  for (let i = 0; i < progress.archivedLibraries; i++) {
    if (i === progress.libraryIndex && !progress.allLibrariesFull) continue; // 지금 채우는 중인 서재는 보관함에 안 넣음
    archiveHtml.push(`
      <div class="archive-card">
        <i class="ti ti-building-bank"></i>
        <div>
          <div class="n">${(i + 1) * BOOKS_PER_LIBRARY}권 도서관</div>
          <div class="l">서재 ${i + 1}번 완성</div>
        </div>
      </div>
    `);
  }

  const captionText = progress.allLibrariesFull
    ? `10개의 서재를 모두 채웠어요 — 총 ${progress.total}문장을 학습했어요!`
    : `${progress.libraryIndex + 1}번째 서재 — ${progress.booksInCurrentLibrary}/${BOOKS_PER_LIBRARY}권`;

  container.innerHTML = `
    <div class="library-full">
      <div class="library-head">
        <div>
          <div class="library-head-title">내 서재</div>
          <div class="library-head-sub">${captionText}</div>
        </div>
        <div class="library-stats">
          <div class="library-stat"><div class="v">${progress.total}</div><div class="l">누적 문장</div></div>
          <div class="library-stat"><div class="v">${progress.totalBooks}</div><div class="l">완성한 책</div></div>
        </div>
      </div>

      <div class="shelf-progress">
        <span>${progress.currentBookFilled}/${SENTENCES_PER_BOOK}문장</span>
        <div class="track"><div class="fill" style="width:${(progress.currentBookFilled / SENTENCES_PER_BOOK) * 100}%;"></div></div>
        <span>다음 책까지</span>
      </div>

      <div class="bookshelf">
        <div class="bookshelf-grid">${slotsHtml.join('')}</div>
      </div>

      ${archiveHtml.length > 0 ? `
        <div class="library-archive">
          <div class="library-archive-title">완성된 도서관</div>
          <div class="library-archive-grid">${archiveHtml.join('')}</div>
        </div>
      ` : ''}
    </div>
  `;

  container.querySelectorAll('.book-slot.filled').forEach(el => {
    el.addEventListener('click', () => showBookModal(parseInt(el.dataset.bookIndex, 10)));
  });
}

// 책 한 권의 정보를 보여주는 모달. 그 책에 해당하는 10문장 구간의 첫 문장을 미리보기로 보여준다.
function showBookModal(globalBookIndex) {
  const color = BOOK_COLORS[globalBookIndex % BOOK_COLORS.length];
  const startSentenceNum = globalBookIndex * SENTENCES_PER_BOOK + 1;
  const endSentenceNum = startSentenceNum + SENTENCES_PER_BOOK - 1;

  const backdrop = document.createElement('div');
  backdrop.className = 'book-modal-backdrop';
  backdrop.innerHTML = `
    <div class="book-modal">
      <div class="book-modal-cover" style="background:${color.bg}; color:${color.label};"><i class="ti ti-book-2"></i></div>
      <h3>${globalBookIndex + 1}번째 책</h3>
      <div class="meta">학습 문장 ${startSentenceNum}~${endSentenceNum}번째</div>
      <div class="preview">이 책은 ${SENTENCES_PER_BOOK}개의 문장을 채점까지 완료하며 채워졌어요. 꾸준히 쌓아온 기록이에요.</div>
    </div>
  `;
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) backdrop.remove();
  });
  document.body.appendChild(backdrop);
}

/* =========================================================
   TAB 1: 영작 연습
   세션 구조: state.write = {
     sourceText, sentences: [englishStr...], krPrompts: [krStr...],
     idx, results: { [idx]: gradeResult }, savedFlags: {[idx]: bool}, finished
   }
   ========================================================= */
function renderWriteTab() {
  const setupEl = document.getElementById('writeSetup');
  const studyEl = document.getElementById('writeStudy');

  if (!state.write || !state.write.sentences || state.write.sentences.length === 0) {
    setupEl.style.display = 'block';
    studyEl.style.display = 'none';
    setupEl.innerHTML = buildPasteSetupHTML('write');
    bindPasteSetup('write');
    return;
  }

  setupEl.style.display = 'none';
  studyEl.style.display = 'block';
  renderWriteStudy();
}

function buildPasteSetupHTML(mode) {
  const isWrite = mode === 'write';
  return `
    <div class="card">
      <h2><i class="ti ${isWrite ? 'ti-pencil' : 'ti-language'}" style="font-size:15px;vertical-align:-2px;"></i> ${isWrite ? '영작 연습 시작하기' : '해석 연습 시작하기'}</h2>
      <p class="desc">${isWrite
        ? '영어 문장을 붙여넣으면, 한 문장씩 한국어로 보여드려요. 그 해석을 보고 영어로 다시 작문해보세요.'
        : '영어 문장을 붙여넣으면, 한 문장씩 보여드려요. 그 문장을 한국어로 해석해보세요.'}</p>
      <textarea class="paste-area" id="${mode}-paste" maxlength="10000" placeholder="여기에 영어 지문을 붙여넣으세요. (최대 10,000자)"></textarea>
      <div class="char-row">
        <span id="${mode}-charcount">0 / 10,000자</span>
        <span id="${mode}-sentpreview"></span>
      </div>
      <div style="margin-top:16px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
        <span class="hint-row" style="margin-top:0;"><kbd>Ctrl</kbd>+<kbd>Enter</kbd>(Mac은 <kbd>⌘</kbd>+<kbd>Enter</kbd>)로 바로 시작할 수 있어요</span>
        <button class="btn" id="${mode}-start-btn" disabled><i class="ti ti-player-play"></i> 학습 시작</button>
      </div>
    </div>
  `;
}

function bindPasteSetup(mode) {
  const textarea = document.getElementById(`${mode}-paste`);
  const charCount = document.getElementById(`${mode}-charcount`);
  const sentPreview = document.getElementById(`${mode}-sentpreview`);
  const startBtn = document.getElementById(`${mode}-start-btn`);

  textarea.addEventListener('input', () => {
    const len = textarea.value.length;
    charCount.textContent = `${len.toLocaleString()} / 10,000자`;
    charCount.classList.toggle('over', len >= 10000);
    const sents = splitIntoSentences(textarea.value);
    if (sents.length === 0) {
      sentPreview.textContent = '';
    } else if (mode === 'write' && sents.length >= 20) {
      sentPreview.textContent = `${sents.length}개 문장으로 나뉠 예정 (번역 준비에 약간 시간이 걸려요)`;
    } else {
      sentPreview.textContent = `${sents.length}개 문장으로 나뉠 예정`;
    }
    startBtn.disabled = sents.length === 0;
  });

  // 줄바꿈이 많은 긴 지문을 붙여넣는 칸이라 단순 Enter는 줄바꿈으로 두고,
  // Ctrl/Cmd+Enter로 학습 시작을 누를 수 있게 한다 (의도치 않은 시작 방지).
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      if (!startBtn.disabled) startBtn.click();
    }
  });

  startBtn.addEventListener('click', async () => {
    const sents = splitIntoSentences(textarea.value);
    if (sents.length === 0) return;
    startBtn.disabled = true;
    startBtn.innerHTML = `<span class="spinner" style="border-top-color:var(--paper);"></span> 준비 중…`;

    if (mode === 'write') {
      // 영작 모드: 영어 문장들을 배치로 묶어 한국어로 미리 번역해서 제시문으로 사용
      try {
        const krPrompts = await translateAllToKorean(sents, (doneCount, total) => {
          startBtn.innerHTML = `<span class="spinner" style="border-top-color:var(--paper);"></span> 번역 준비 중… (${doneCount}/${total})`;
        });
        state.write = {
          sourceText: textarea.value,
          sentences: sents,
          krPrompts,
          idx: 0,
          results: {},
          savedFlags: {},
          finished: false,
        };
        await storageSet(STORAGE_KEYS.WRITE_SESSION, state.write);
        renderWriteTab();
      } catch (e) {
        console.error(e);
        showToast('문장을 준비하는 중 오류가 발생했어요. 다시 시도해주세요.', true);
        startBtn.disabled = false;
        startBtn.innerHTML = `<i class="ti ti-player-play"></i> 학습 시작`;
      }
    } else {
      state.interpret = {
        sourceText: textarea.value,
        sentences: sents,
        idx: 0,
        results: {},
        savedFlags: {},
        finished: false,
      };
      await storageSet(STORAGE_KEYS.INTERPRET_SESSION, state.interpret);
      renderInterpretTab();
    }
  });
}

function renderWriteStudy() {
  const studyEl = document.getElementById('writeStudy');
  const sess = state.write;

  if (sess.finished || sess.idx >= sess.sentences.length) {
    studyEl.innerHTML = buildSessionDoneHTML('write');
    bindSessionDoneActions('write');
    return;
  }

  const idx = sess.idx;
  const krPrompt = sess.krPrompts[idx];
  const result = sess.results[idx];
  const total = sess.sentences.length;

  studyEl.innerHTML = `
    <div class="progress-strip">
      <span class="label">${idx + 1} / ${total} 문장</span>
      <div class="track"><div class="fill" style="width:${((idx) / total) * 100}%;"></div></div>
      <button class="btn ghost sm" id="write-restart"><i class="ti ti-rotate-clockwise-2"></i> 새 지문</button>
    </div>
    <div class="study-card">
      <div class="src-label"><i class="ti ti-language" style="font-size:13px;"></i> 한국어 해석</div>
      <p class="src-text">${escapeHtml(krPrompt)}</p>

      <button class="reveal-toggle" id="write-reveal-btn" type="button">
        <i class="ti ti-eye"></i> 원문 보기
      </button>
      <div class="reveal-box" id="write-reveal-box" style="display:none;">
        <span class="reveal-label">영어 원문</span>
        <p class="reveal-text">${escapeHtml(sess.sentences[idx])}</p>
      </div>

      <div class="answer-row">
        <textarea id="write-answer" placeholder="위 해석에 맞는 영어 문장을 작성해보세요" ${result ? 'readonly' : ''}>${result ? escapeHtml(sess.lastUserAnswer || '') : ''}</textarea>
        <button class="send-btn" id="write-submit" ${result ? 'disabled' : ''} aria-label="제출"><span>Enter</span><i class="ti ti-corner-down-left"></i></button>
      </div>
      <div class="hint-row-flex">
        <span class="hint-row">${result ? '' : '문장을 쓰고 <kbd>Enter</kbd> 를 누르면 채점돼요 (줄바꿈은 <kbd>Shift+Enter</kbd>)'}</span>
        ${result ? '' : '<button class="skip-btn" id="write-skip" type="button"><i class="ti ti-player-skip-forward"></i> 이 문장 건너뛰기</button>'}
      </div>

      <div id="write-grade-area"></div>
    </div>
  `;

  document.getElementById('write-restart').addEventListener('click', () => confirmRestart('write'));

  const revealBtn = document.getElementById('write-reveal-btn');
  const revealBox = document.getElementById('write-reveal-box');
  revealBtn.addEventListener('click', () => {
    const showing = revealBox.style.display !== 'none';
    revealBox.style.display = showing ? 'none' : 'block';
    revealBtn.classList.toggle('active', !showing);
    revealBtn.innerHTML = showing
      ? '<i class="ti ti-eye"></i> 원문 보기'
      : '<i class="ti ti-eye-off"></i> 원문 숨기기';
  });

  const answerBox = document.getElementById('write-answer');
  const submitBtn = document.getElementById('write-submit');

  if (!result) {
    answerBox.focus();
    const trySubmit = () => doGradeWrite(idx, answerBox.value);
    submitBtn.addEventListener('click', trySubmit);
    answerBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (answerBox.value.trim().length > 0) trySubmit();
      }
    });
    answerBox.addEventListener('input', () => {
      submitBtn.disabled = answerBox.value.trim().length === 0;
    });
    submitBtn.disabled = true;

    const skipBtn = document.getElementById('write-skip');
    if (skipBtn) skipBtn.addEventListener('click', () => skipSentence('write'));
  } else {
    renderGradeResult('write', idx, result);
  }
}

async function doGradeWrite(idx, userAnswer) {
  const sess = state.write;
  const gradeArea = document.getElementById('write-grade-area');
  const submitBtn = document.getElementById('write-submit');
  const answerBox = document.getElementById('write-answer');
  submitBtn.disabled = true;
  answerBox.readOnly = true;
  gradeArea.innerHTML = `<div class="loading-row"><span class="spinner"></span> 채점하고 있어요…</div>`;

  try {
    const result = await gradeAnswerWrite(sess.krPrompts[idx], sess.sentences[idx], userAnswer);
    sess.results[idx] = result;
    sess.lastUserAnswer = userAnswer;
    await storageSet(STORAGE_KEYS.WRITE_SESSION, sess);
    renderGradeResult('write', idx, result);

    // 틀린 단어 자동 저장
    if (result.wrong_words && result.wrong_words.length > 0) {
      await autoSaveWrongWords(result.wrong_words, sess.sentences[idx]);
    }
  } catch (e) {
    console.error(e);
    gradeArea.innerHTML = `<div class="loading-row" style="color:var(--red);"><i class="ti ti-alert-circle"></i> 채점 중 오류가 발생했어요. 다시 시도해주세요.</div>
      <div style="margin-top:10px;"><button class="btn ghost sm" id="write-retry"><i class="ti ti-refresh"></i> 다시 채점</button></div>`;
    document.getElementById('write-retry').addEventListener('click', () => doGradeWrite(idx, userAnswer));
    submitBtn.disabled = false;
    answerBox.readOnly = false;
  }
}

/* =========================================================
   TAB 2: 해석 연습
   ========================================================= */
function renderInterpretTab() {
  const setupEl = document.getElementById('interpretSetup');
  const studyEl = document.getElementById('interpretStudy');

  if (!state.interpret || !state.interpret.sentences || state.interpret.sentences.length === 0) {

}

function renderInterpretStudy() {

  studyEl.innerHTML = `
    <div class="progress-strip">

      <div class="track"><div class="fill" style="width:${((idx) / total) * 100}%;"></div></div>
      <button class="btn ghost sm" id="interpret-restart"><i class="ti ti-rotate-clockwise-2"></i> 새 지문</button>

    <div class="study-card">
      <div class="src-label"><i class="ti ti-abc" style="font-size:13px;"></i> 영어 원문</div>
      <p class="src-text">${escapeHtml(sourceSentence)}</p>

      <div class="answer-row">
        <textarea id="interpret-answer" placeholder="위 문장을 한국어로 해석해보세요" ${result ? 'readonly' : ''}>${result ? escapeHtml(sess.lastUserAnswer || '') : ''}</textarea>
        <button class="send-btn" id="interpret-submit" ${result ? 'disabled' : ''} aria-label="제출"><span>Enter</span><i class="ti ti-corner-down-left"></i></button>
      </div>
      <div class="hint-row-flex">
        <span class="hint-row">${result ? '' : '해석을 쓰고 <kbd>Enter</kbd> 를 누르면 채점돼요 (줄바꿈은 <kbd>Shift+Enter</kbd>)'}</span>
        ${result ? '' : '<button class="skip-btn" id="interpret-skip" type="button"><i class="ti ti-player-skip-forward"></i> 이 문장 건너뛰기</button>'}
      </div>

      <div id="interpret-grade-area"></div>
    </div>
  `;

  document.getElementById('interpret-restart').addEventListener('click', () => confirmRestart('interpret'));

  const answerBox = document.getElementById('interpret-answer');
  const submitBtn = document.getElementById('interpret-submit');

  if (!result) {
    answerBox.focus();
    const trySubmit = () => doGradeInterpret(idx, answerBox.value);
    submitBtn.addEventListener('click', trySubmit);
    answerBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (answerBox.value.trim().length > 0) trySubmit();
      }
    });
    answerBox.addEventListener('input', () => {
      submitBtn.disabled = answerBox.value.trim().length === 0;
    });
    submitBtn.disabled = true;

    const skipBtn = document.getElementById('interpret-skip');
    if (skipBtn) skipBtn.addEventListener('click', () => skipSentence('interpret'));
  } else {
    renderGradeResult('interpret', idx, result);
  }
}

async function doGradeInterpret(idx, userAnswer) {
  const sess = state.interpret;
  const gradeArea = document.getElementById('interpret-grade-area');
  const submitBtn = document.getElementById('interpret-submit');
  const answerBox = document.getElementById('interpret-answer');
  submitBtn.disabled = true;
  answerBox.readOnly = true;
  gradeArea.innerHTML = `<div class="loading-row"><span class="spinner"></span> 채점하고 있어요…</div>`;

  try {
    const result = await gradeAnswerInterpret(sess.sentences[idx], userAnswer);
    sess.results[idx] = result;
    sess.lastUserAnswer = userAnswer;
    await storageSet(STORAGE_KEYS.INTERPRET_SESSION, sess);
    renderGradeResult('interpret', idx, result);

    if (result.wrong_words && result.wrong_words.length > 0) {
      await autoSaveWrongWords(result.wrong_words, sess.sentences[idx]);
    }
  } catch (e) {
    console.error(e);
    gradeArea.innerHTML = `<div class="loading-row" style="color:var(--red);"><i class="ti ti-alert-circle"></i> 채점 중 오류가 발생했어요. 다시 시도해주세요.</div>
      <div style="margin-top:10px;"><button class="btn ghost sm" id="interpret-retry"><i class="ti ti-refresh"></i> 다시 채점</button></div>`;
    document.getElementById('interpret-retry').addEventListener('click', () => doGradeInterpret(idx, userAnswer));
    submitBtn.disabled = false;
    answerBox.readOnly = false;
  }
}

/* =========================================================
   채점 결과 공통 렌더링
   ========================================================= */
function renderGradeResult(mode, idx, result) {
  const gradeArea = document.getElementById(`${mode}-grade-area`);
  const sess = mode === 'write' ? state.write : state.interpret;
  const sc = result.score;
  const cls = scoreClass(sc);
  const isSaved = !!sess.savedFlags[idx];
  const canSave = sc < 7;

  const issuesHTML = result.issues.length === 0
    ? `<p style="font-size:13px; color:var(--ink-soft);"><i class="ti ti-check" style="color:var(--green);"></i> 별다른 오류가 없어요.</p>`
    : result.issues.map(iss => `
      <div class="issue-item">
        <div class="issue-head">
          <span class="badge ${iss.type === 'word' ? 'word' : (iss.type === 'style' ? 'style' : 'grammar')}">${iss.type === 'word' ? '단어' : (iss.type === 'style' ? '표현' : '문법')}</span>
        </div>
        <div class="wrong-right"><span class="w">${escapeHtml(iss.wrong || '')}</span><span class="arrow">→</span><span class="r">${escapeHtml(iss.right || '')}</span></div>
        <div class="explain">${escapeHtml(iss.explain_kr || '')}</div>
      </div>
    `).join('');

  const userLabel = mode === 'write' ? '내가 쓴 영어' : '내가 쓴 해석';
  const fixedLabel = mode === 'write' ? '교정된 영어' : '자연스러운 해석';

  gradeArea.innerHTML = `
    <div class="grade-wrap">
      <div class="grade-head">
        <div class="score-stamp ${cls}"><span class="num">${sc}</span><span class="den">/ 10</span></div>
        <div class="grade-headline">
          <div class="verdict ${cls}">${escapeHtml(result.verdict_kr || scoreVerdict(sc))}</div>
          <div class="one-line">${scoreVerdict(sc)}</div>
        </div>
      </div>

      <div class="your-sentence"><span class="tag">${userLabel}</span>${escapeHtml(sess.lastUserAnswer || '')}</div>
      <div class="corrected-sentence"><span class="tag">${fixedLabel}</span>${escapeHtml(result.corrected_sentence || '')}</div>

      <div class="issue-list">${issuesHTML}</div>

      <div class="grade-actions">
        <button class="btn" id="${mode}-ok-btn"><i class="ti ti-arrow-right"></i> 다음 문장</button>
        ${canSave ? `
          <button class="btn ${isSaved ? 'ghost' : 'gold'}" id="${mode}-save-btn" ${isSaved ? 'disabled' : ''}>
            <i class="ti ${isSaved ? 'ti-check' : 'ti-bookmark-plus'}"></i> ${isSaved ? '저장됨' : '틀린 문장함에 저장'}
          </button>
        ` : ''}
      </div>
    </div>
  `;

  document.getElementById(`${mode}-ok-btn`).addEventListener('click', () => goNextSentence(mode));

  const saveBtn = document.getElementById(`${mode}-save-btn`);
  if (saveBtn) {
    saveBtn.addEventListener('click', () => saveSentenceToBox(mode, idx, result));
  }
}

async function goNextSentence(mode) {
  const sess = mode === 'write' ? state.write : state.interpret;
  sess.idx += 1;
  sess.lastUserAnswer = '';
  if (sess.idx >= sess.sentences.length) sess.finished = true;
  await storageSet(mode === 'write' ? STORAGE_KEYS.WRITE_SESSION : STORAGE_KEYS.INTERPRET_SESSION, sess);
  await addLibraryProgress();
  if (mode === 'write') renderWriteStudy(); else renderInterpretStudy();
}

// 채점 없이 다음 문장으로 건너뛴다. 서재 누적 카운트는 채점된 문장만 인정하므로 증가시키지 않는다.
async function skipSentence(mode) {
  const sess = mode === 'write' ? state.write : state.interpret;
  sess.idx += 1;
  sess.lastUserAnswer = '';
  if (sess.idx >= sess.sentences.length) sess.finished = true;
  await storageSet(mode === 'write' ? STORAGE_KEYS.WRITE_SESSION : STORAGE_KEYS.INTERPRET_SESSION, sess);
  if (mode === 'write') renderWriteStudy(); else renderInterpretStudy();
}


async function saveSentenceToBox(mode, idx, result) {
  const sess = mode === 'write' ? state.write : state.interpret;
  const sourceSentence = mode === 'write' ? sess.krPrompts[idx] : sess.sentences[idx];

  const entry = {
    id: uid(),
    mode,
    source: mode === 'write' ? sess.krPrompts[idx] : sess.sentences[idx],
    modelAnswer: mode === 'write' ? sess.sentences[idx] : null,
    mine: sess.lastUserAnswer,
    corrected: result.corrected_sentence,
    score: result.score,
    issues: result.issues,
    createdAt: Date.now(),
  };
  state.sentences.unshift(entry);
  sess.savedFlags[idx] = true;

  await Promise.all([
    storageSet(STORAGE_KEYS.SENTENCES, state.sentences),
    storageSet(mode === 'write' ? STORAGE_KEYS.WRITE_SESSION : STORAGE_KEYS.INTERPRET_SESSION, sess),
  ]);
  updateBadgeCounts();
  showToast('틀린 문장함에 저장했어요.');
  renderGradeResult(mode, idx, result);
}

async function autoSaveWrongWords(wrongWords, contextSentence) {
  let changed = false;
  for (const ww of wrongWords) {
    if (!ww.correct_word) continue;
    const exists = state.words.some(w =>
      w.word.trim().toLowerCase() === ww.correct_word.trim().toLowerCase() &&
      w.wrongForm.trim().toLowerCase() === (ww.wrong_form || '').trim().toLowerCase()
    );
    if (exists) continue;
    state.words.unshift({
      id: uid(),
      word: ww.correct_word,
      meaning: ww.meaning_kr || '',
      example: ww.example_sentence || '',
      wrongForm: ww.wrong_form || '',
      source: contextSentence || '',
      createdAt: Date.now(),
    });
    changed = true;
  }
  if (changed) {
    await storageSet(STORAGE_KEYS.WORDS, state.words);
    updateBadgeCounts();
  }
}

/* =========================================================
   세션 완료 화면
   ========================================================= */
function buildSessionDoneHTML(mode) {
  const sess = mode === 'write' ? state.write : state.interpret;
  const results = Object.values(sess.results || {});
  const avg = results.length > 0 ? (results.reduce((a, r) => a + r.score, 0) / results.length) : 0;
  const lowCount = results.filter(r => r.score < 7).length;

  return `
    <div class="study-card session-done">
      <i class="ti ti-confetti"></i>
      <h3>오늘 지문을 다 끝냈어요</h3>
      <p>총 ${sess.sentences.length}문장을 학습했어요.</p>
      <div class="session-stats">
        <div class="stat"><div class="v">${avg.toFixed(1)}</div><div class="l">평균 점수</div></div>
        <div class="stat"><div class="v">${lowCount}</div><div class="l">저장 대상 문장</div></div>
        <div class="stat"><div class="v">${sess.sentences.length}</div><div class="l">전체 문장</div></div>
      </div>
      <button class="btn" id="${mode}-new-passage"><i class="ti ti-pencil-plus"></i> 새 지문으로 계속하기</button>
    </div>
  `;
}

function bindSessionDoneActions(mode) {
  document.getElementById(`${mode}-new-passage`).addEventListener('click', () => confirmRestart(mode));
}

async function confirmRestart(mode) {
  const ok = window.confirm('현재 지문 학습을 종료하고 새 지문을 붙여넣을까요?\n(지금까지의 채점 기록은 사라지지만, 저장한 단어/문장은 그대로 남아요)');
  if (!ok) return;
  if (mode === 'write') {
    state.write = null;
    await storageDelete(STORAGE_KEYS.WRITE_SESSION);
    renderWriteTab();
  } else {
    state.interpret = null;
    await storageDelete(STORAGE_KEYS.INTERPRET_SESSION);
    renderInterpretTab();
  }
}

/* =========================================================
   TAB 3: 틀린 단어장
   ========================================================= */
function renderWordsTab(filterText) {
  const container = document.getElementById('wordsContent');
  const filter = (filterText || '').trim().toLowerCase();
  const list = filter
    ? state.words.filter(w =>
        w.word.toLowerCase().includes(filter) ||
        w.meaning.toLowerCase().includes(filter) ||
        w.wrongForm.toLowerCase().includes(filter))
    : state.words;

  const toolbar = `
    <div class="list-toolbar">
      <div class="search-box">
        <i class="ti ti-search"></i>
        <input type="text" id="word-search" placeholder="단어, 뜻으로 검색" value="${escapeHtml(filterText || '')}" />
      </div>
      ${state.words.length > 0 ? `<button class="btn ghost sm" id="word-clear-all"><i class="ti ti-trash"></i> 전체 삭제</button>` : ''}
    </div>
  `;

  if (state.words.length === 0) {
    container.innerHTML = toolbar + `
      <div class="empty-state">
        <i class="ti ti-bookmark"></i>
        <div class="t1">아직 저장된 단어가 없어요</div>
        <div class="t2">영작이나 해석 연습 중 단어를 틀리면, 올바른 표현이 자동으로 여기에 모여요.</div>
      </div>`;
  } else if (list.length === 0) {
    container.innerHTML = toolbar + `
      <div class="empty-state">
        <i class="ti ti-search"></i>
        <div class="t1">검색 결과가 없어요</div>
        <div class="t2">다른 검색어로 찾아보세요.</div>
      </div>`;
  } else {
    container.innerHTML = toolbar + `<div class="word-grid">${list.map(w => `
      <div class="word-card" data-id="${w.id}">
        <div class="wc-actions"><button class="icon-btn" data-del-word="${w.id}" aria-label="삭제"><i class="ti ti-x"></i></button></div>
        <div class="wc-top">
          <div>
            <div class="correct-word">${escapeHtml(w.word)}</div>
            <div class="kr-meaning">${escapeHtml(w.meaning)}</div>
          </div>
        </div>
        ${w.wrongForm ? `<div class="wrong-orig"><i class="ti ti-x" style="font-size:11px;"></i> 내가 쓴 표현: ${escapeHtml(w.wrongForm)}</div>` : ''}
        ${w.example ? `<div class="example">${escapeHtml(w.example)}</div>` : ''}
      </div>
    `).join('')}</div>`;
  }

  const searchInput = document.getElementById('word-search');
  if (searchInput) {
    let composing = false;
    searchInput.addEventListener('compositionstart', () => { composing = true; });
    searchInput.addEventListener('compositionend', (e) => {
      composing = false;
      renderWordsTab(e.target.value);
    });
    searchInput.addEventListener('input', (e) => {
      if (composing) return; // 한글 자모 조합 중에는 리렌더링하지 않음 (IME 포커스 유지)
      renderWordsTab(e.target.value);
    });
    if (filterText) {
      searchInput.focus();
      searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
    }
  }
  const clearAllBtn = document.getElementById('word-clear-all');
  if (clearAllBtn) {
    clearAllBtn.addEventListener('click', async () => {
      if (!window.confirm('저장된 단어를 모두 삭제할까요? 이 작업은 되돌릴 수 없어요.')) return;
      state.words = [];
      await storageSet(STORAGE_KEYS.WORDS, state.words);
      updateBadgeCounts();
      renderWordsTab();
      showToast('단어장을 비웠어요.');
    });
  }
  container.querySelectorAll('[data-del-word]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.getAttribute('data-del-word');
      state.words = state.words.filter(w => w.id !== id);
      await storageSet(STORAGE_KEYS.WORDS, state.words);
      updateBadgeCounts();
      renderWordsTab(searchInput ? searchInput.value : '');
      showToast('단어를 삭제했어요.');
    });
  });
}

/* =========================================================
   TAB 4: 틀린 문장함
   ========================================================= */
function renderSentencesTab(filterText) {
  const container = document.getElementById('sentencesContent');
  const filter = (filterText || '').trim().toLowerCase();
  const list = filter
    ? state.sentences.filter(s =>
        s.source.toLowerCase().includes(filter) ||
        (s.mine || '').toLowerCase().includes(filter))
    : state.sentences;

  const toolbar = `
    <div class="list-toolbar">
      <div class="search-box">
        <i class="ti ti-search"></i>
        <input type="text" id="sent-search" placeholder="문장으로 검색" value="${escapeHtml(filterText || '')}" />
      </div>
      ${state.sentences.length > 0 ? `<button class="btn ghost sm" id="sent-clear-all"><i class="ti ti-trash"></i> 전체 삭제</button>` : ''}
    </div>
  `;

  if (state.sentences.length === 0) {
    container.innerHTML = toolbar + `
      <div class="empty-state">
        <i class="ti ti-notes"></i>
        <div class="t1">아직 저장된 문장이 없어요</div>
        <div class="t2">7점 미만을 받은 문장에서 저장 버튼을 누르면 여기에 모여요.</div>
      </div>`;
  } else if (list.length === 0) {
    container.innerHTML = toolbar + `
      <div class="empty-state">
        <i class="ti ti-search"></i>
        <div class="t1">검색 결과가 없어요</div>
        <div class="t2">다른 검색어로 찾아보세요.</div>
      </div>`;
  } else {
    container.innerHTML = toolbar + `<div class="sent-list">${list.map(s => {
      const cls = scoreClass(s.score);
      const modeLabel = s.mode === 'write' ? '영작' : '해석';
      const date = new Date(s.createdAt).toLocaleDateString('ko-KR', { year: 'numeric', month: 'short', day: 'numeric' });
      const colorName = cls === 'good' ? 'green' : (cls === 'mid' ? 'gold' : 'red');
    return `
      <div class="sent-card" data-id="${s.id}">
        <div class="sc-top">
          <div class="sc-meta"><i class="ti ${s.mode === 'write' ? 'ti-pencil' : 'ti-language'}"></i> ${modeLabel} · ${date}</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="sc-score" style="background:var(--${colorName}-bg); color:var(--${colorName});">${s.score} / 10</span>
            <button class="icon-btn" data-del-sent="${s.id}" aria-label="삭제"><i class="ti ti-x"></i></button>
          </div>
        </div>
        <div class="src">${escapeHtml(s.source)}</div>
        <div class="mine"><i class="ti ti-x" style="font-size:12px;"></i> ${escapeHtml(s.mine || '')}</div>
        <div class="fixed"><i class="ti ti-check" style="font-size:12px;"></i> ${escapeHtml(s.corrected || '')}</div>
      </div>`;
    }).join('')}</div>`;
  }

  const searchInput = document.getElementById('sent-search');
  if (searchInput) {
    let composing = false;
    searchInput.addEventListener('compositionstart', () => { composing = true; });
    searchInput.addEventListener('compositionend', (e) => {
      composing = false;
      renderSentencesTab(e.target.value);
    });
    searchInput.addEventListener('input', (e) => {
      if (composing) return; // 한글 자모 조합 중에는 리렌더링하지 않음 (IME 포커스 유지)
      renderSentencesTab(e.target.value);
    });
    if (filterText) {
      searchInput.focus();
      searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
    }
  }
  const clearAllBtn = document.getElementById('sent-clear-all');
  if (clearAllBtn) {
    clearAllBtn.addEventListener('click', async () => {
      if (!window.confirm('저장된 문장을 모두 삭제할까요? 이 작업은 되돌릴 수 없어요.')) return;
      state.sentences = [];
      await storageSet(STORAGE_KEYS.SENTENCES, state.sentences);
      updateBadgeCounts();
      renderSentencesTab();
      showToast('문장함을 비웠어요.');
    });
  }
  container.querySelectorAll('[data-del-sent]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.getAttribute('data-del-sent');
      state.sentences = state.sentences.filter(s => s.id !== id);
      await storageSet(STORAGE_KEYS.SENTENCES, state.sentences);
      updateBadgeCounts();
      renderSentencesTab(searchInput ? searchInput.value : '');
      showToast('문장을 삭제했어요.');
    });
  });
}

/* =========================================================
   부트스트랩
   ========================================================= */
document.addEventListener('DOMContentLoaded', () => {
  initTabs();
  loadAll().catch(e => {
    console.error('초기 로드 실패', e);
    showToast('데이터를 불러오는 중 문제가 발생했어요.', true);
  });
});

</script>
